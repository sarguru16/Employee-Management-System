services:
  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: employee_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .

    ports:
      - "5000:5000"

    depends_on:
      - mysql

volumes:
  mysql_data: